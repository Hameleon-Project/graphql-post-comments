scalar Time

type Post {
    id: ID!
    title: String!
    content: String!
    commentsHidden: Boolean!
    comments(limit: Int!, offset: Int!): [Comment!]!
}

type Comment {
    id: ID!
    postId: ID!
    parentId: ID
    content: String!
    createdAt: Time!
}

type Query {
    posts: [Post!]!
    post(id: ID!): Post
}

type Mutation {
    createPost(title: String!, content: String!, commentsHidden: Boolean!): Post!
    createComment(postId: ID!, parentId: ID, content: String!): Comment!
    toggleComments(postId: ID!, hidden: Boolean!): Post!
}

type Subscription {
    commentAdded(postId: ID!): Comment!
}