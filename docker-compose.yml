services:
  postgres:
    image: postgres:15-alpine
    container_name: graphql_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: graphql_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/000001_init.up.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d graphql_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: graphql_app
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - STORAGE_TYPE=postgres
      - DATABASE_URL=postgres://user:password@postgres:5432/graphql_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: